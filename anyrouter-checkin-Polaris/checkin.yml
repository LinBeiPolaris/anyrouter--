name: AnyRouter 自动签到

on:
  schedule:
    - cron: '0 */6 * * *'   # 每 6 小时执行一次（anyrouter 每 24h 可签一次，多次运行会返回"已签到"）
  workflow_dispatch:          # 支持手动触发

jobs:
  checkin:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行签到
        env:
          # 必填：账号信息
          ANYROUTER_ACCOUNTS: ${{ secrets.ANYROUTER_ACCOUNTS }}

          # 可选：是否显示敏感信息（公开仓库请保持 false）
          SHOW_SENSITIVE_INFO: false

          # 可选：通知配置（在仓库 Settings → Environments → production → Secrets 中添加）
          TELEGRAM_NOTIF_CONFIG:  ${{ secrets.TELEGRAM_NOTIF_CONFIG }}
          DINGTALK_NOTIF_CONFIG:  ${{ secrets.DINGTALK_NOTIF_CONFIG }}
          WECOM_NOTIF_CONFIG:     ${{ secrets.WECOM_NOTIF_CONFIG }}
          EMAIL_NOTIF_CONFIG:     ${{ secrets.EMAIL_NOTIF_CONFIG }}

          # 可选：自定义服务商
          # PROVIDERS: ${{ secrets.PROVIDERS }}

        run: python main.py
